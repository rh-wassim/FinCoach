version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "5050:5050"
    env_file:
      - ./backend/.env
    depends_on:
      - ml-service
    restart: unless-stopped

  ml-service:
    build: ./ml-service
    ports:
      - "5001:5001"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
