<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 278 64" role="img" aria-labelledby="fincoach-logo-title">
  <title id="fincoach-logo-title">FinCoach</title>
  <defs>
    <linearGradient id="fc-logo-bg" x1="8" y1="6" x2="58" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6EA0FF"/>
      <stop offset="0.48" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#102A83"/>
    </linearGradient>
    <linearGradient id="fc-logo-glow" x1="16" y1="10" x2="52" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fc-word-gradient" x1="130" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#12B981"/>
    </linearGradient>
    <filter id="fc-logo-shadow" x="-16%" y="-16%" width="132%" height="132%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#1E40AF" flood-opacity="0.22"/>
    </filter>
  </defs>

  <style>
    .fc-word-main { fill: #08111F; }
    .fc-tagline { fill: #64748B; }
    @media (prefers-color-scheme: dark) {
      .fc-word-main { fill: #F8FAFC; }
      .fc-tagline { fill: #94A3B8; }
    }
  </style>

  <g filter="url(#fc-logo-shadow)">
    <rect x="4" y="6" width="52" height="52" rx="17" fill="url(#fc-logo-bg)"/>
    <path d="M10 11.4C17.8 8 29.8 8.8 40.5 14C46.4 16.8 51 20.8 54 25.5V13C54 9.1 50.9 6 47 6H15C11.1 6 8 9.1 8 13V12.2L10 11.4Z" fill="url(#fc-logo-glow)"/>
    <path d="M16 40L25.2 31.1L32.2 35.4L44.8 22" fill="none" stroke="#FFFFFF" stroke-width="3.9" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="16" cy="40" r="3.2" fill="#DBEAFE"/>
    <circle cx="25.2" cy="31.1" r="3.2" fill="#DBEAFE"/>
    <circle cx="32.2" cy="35.4" r="3.2" fill="#DBEAFE"/>
    <circle cx="44.8" cy="22" r="4" fill="#5EF2B6"/>
    <path d="M44.8 16.5V13.8M44.8 30.2V27.5M50.3 22H53M36.6 22H39.3" stroke="#CFFCE6" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M41.2 18.4L39.4 16.6M50.2 27.4L48.4 25.6M48.4 18.4L50.2 16.6M39.4 27.4L41.2 25.6" stroke="#CFFCE6" stroke-width="1.65" stroke-linecap="round" opacity="0.92"/>
  </g>

  <text x="72" y="34" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'DM Sans', system-ui, sans-serif" font-size="27" font-weight="850" letter-spacing="-0.65" class="fc-word-main">Fin</text>
  <text x="114" y="34" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'DM Sans', system-ui, sans-serif" font-size="27" font-weight="850" letter-spacing="-0.65" fill="url(#fc-word-gradient)">Coach</text>
  <text x="73" y="49" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'DM Sans', system-ui, sans-serif" font-size="8.2" font-weight="800" letter-spacing="1.9" class="fc-tagline">AI FINANCE ASSISTANT</text>
</svg>
